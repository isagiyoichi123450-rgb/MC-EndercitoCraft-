<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mc Ender Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background: radial-gradient(circle at top, #1a1a2e, #0b0b0b); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .liquid-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .menu-lateral { transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        .menu-lateral.active { transform: translateX(0); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); transition: 0.2s; }
        .btn-primary:active { scale: 0.95; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="max-w-lg mx-auto pb-24">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 liquid-glass z-50 p-6 menu-lateral m-2 shadow-2xl">
        <h2 class="font-black text-blue-400 text-3xl italic mb-10 tracking-tighter">MC ENDER</h2>
        <nav class="space-y-3">
            <button onclick="irA('inicio')" class="w-full text-left p-4 rounded-2xl bg-white/5 hover:bg-white/10 font-bold transition">🏠 Inicio</button>
            <button id="btn-menu-publicar" onclick="irA('publicar')" class="hidden w-full text-left p-4 rounded-2xl bg-blue-500/10 hover:bg-blue-500/20 font-bold transition border border-blue-500/30">🚀 Publicar Addon</button>
            <hr class="border-white/10 my-4">
            
            <div id="auth-container">
                <button id="btn-login" onclick="iniciarSesion()" class="w-full text-left p-4 rounded-2xl bg-blue-600/20 hover:bg-blue-600/30 font-bold transition border border-blue-500/50">
                    🔵 Continuar con Google
                </button>
                <div id="perfil-usuario" class="hidden">
                    <div class="p-4 rounded-2xl bg-white/5 mb-2 border border-white/10">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Usuario</p>
                        <p id="nombre-usuario" class="font-black text-blue-400 truncate"></p>
                    </div>
                    <button onclick="cerrarSesion()" class="w-full text-left p-4 rounded-2xl bg-red-600/10 hover:bg-red-600/20 font-bold transition border border-red-500/20 text-red-400">🚪 Cerrar Sesión</button>
                </div>
            </div>
        </nav>
    </div>

    <header class="flex items-center justify-between p-6 sticky top-0 z-40 bg-black/50 backdrop-blur-md">
        <button onclick="toggleMenu()" class="liquid-glass p-3 px-5 text-xl">☰</button>
        <div class="text-right">
            <h1 class="text-2xl font-black text-blue-400 italic tracking-tighter">MC ENDER</h1>
            <p id="status" class="text-[8px] text-gray-500 font-bold uppercase tracking-widest italic">Desconectado</p>
        </div>
    </header>

    <main class="p-4">
        <div id="seccion-inicio">
            <div id="lista-addons" class="space-y-4 text-center">
                <div class="loading-spinner inline-block" id="loader-principal" style="display: inline-block;"></div>
            </div>
        </div>

        <div id="seccion-publicar" class="hidden">
            <div class="liquid-glass p-6 border-blue-500/20">
                <h2 class="text-xl font-black mb-6 text-blue-400 italic text-center uppercase">Subir Contenido</h2>
                <div class="space-y-4">
                    <input type="text" id="add-title" placeholder="Nombre" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                    <textarea id="add-desc" placeholder="Descripción..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 h-24 resize-none"></textarea>
                    <input type="text" id="add-link" placeholder="Link (Mediafire/Drive)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                    <input type="file" id="add-image" accept="image/*" class="w-full text-xs text-gray-500">
                    <button onclick="publicarAddon()" id="btn-subir" class="btn-primary w-full py-4 rounded-2xl font-black">PUBLICAR AHORA</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN DE TU CUENTA NUEVA
        const firebaseConfig = {
            apiKey: "AIzaSyDnui2ui53sn30EDm3daaIdbt9-oVdJQng",
            authDomain: "addonverse-78e65.firebaseapp.com",
            projectId: "addonverse-78e65",
            storageBucket: "addonverse-78e65.appspot.com",
            messagingSenderId: "862103750236",
            appId: "1:862103750236:web:3df64155e18cf90211c899"
        };

        // INICIALIZACIÓN SIN ERRORES
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let userLogueado = null;

        // --- ARREGLO DE GOOGLE (MÉTODO REDIRECT) ---
        function iniciarSesion() {
            // Este comando saca al usuario de la página para elegir su cuenta
            auth.signInWithRedirect(provider);
        }

        function cerrarSesion() {
            auth.signOut().then(() => { window.location.reload(); });
        }

        // Esta parte es la que "atrapa" al usuario cuando regresa de Google
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                console.log("Sesión recuperada con éxito");
            }
        }).catch((error) => {
            console.error("Error en el regreso de Google:", error.message);
        });

        // Monitor de estado de usuario
        auth.onAuthStateChanged((user) => {
            const btnLogin = document.getElementById('btn-login');
            const perfil = document.getElementById('perfil-usuario');
            const btnPub = document.getElementById('btn-menu-publicar');
            const status = document.getElementById('status');

            if (user) {
                userLogueado = user;
                btnLogin.classList.add('hidden');
                perfil.classList.remove('hidden');
                btnPub.classList.remove('hidden');
                document.getElementById('nombre-usuario').innerText = user.displayName;
                status.innerText = "Conectado como " + user.displayName;
                status.classList.replace('text-gray-500', 'text-blue-400');
            } else {
                userLogueado = null;
                btnLogin.classList.remove('hidden');
                perfil.classList.add('hidden');
                btnPub.classList.add('hidden');
                status.innerText = "Desconectado";
            }
        });

        // NAVEGACIÓN
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function irA(sec) {
            document.getElementById('seccion-inicio').classList.add('hidden');
            document.getElementById('seccion-publicar').classList.add('hidden');
            document.getElementById('seccion-' + sec).classList.remove('hidden');
            if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        }

        // MOSTRAR ADDONS
        db.collection("addons").orderBy("fecha", "desc").onSnapshot((snap) => {
            const lista = document.getElementById('lista-addons');
            document.getElementById('loader-principal').style.display = "none";
            lista.innerHTML = "";
            snap.forEach((doc) => {
                const d = doc.data();
                lista.innerHTML += `
                    <div class="liquid-glass p-3 flex gap-4 items-center border border-white/5 mb-4 shadow-xl">
                        <img src="${d.foto}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1 text-left">
                            <div class="text-sm font-black text-white uppercase italic">${d.titulo}</div>
                            <p class="text-[7px] text-gray-500 uppercase mt-1">Por: ${d.autor}</p>
                        </div>
                        <a href="${d.link}" target="_blank" class="bg-blue-500 p-2 rounded-lg text-[10px] font-bold">LINK</a>
                    </div>`;
            });
        });

        // SUBIR ADDON
        function publicarAddon() {
            if(!userLogueado) return alert("Inicia sesión primero");
            const t = document.getElementById('add-title').value;
            const d = document.getElementById('add-desc').value;
            const l = document.getElementById('add-link').value;
            const f = document.getElementById('add-image').files[0];

            if(!t || !f) return alert("Falta el título o la imagen");

            const reader = new FileReader();
            reader.onload = (e) => {
                db.collection("addons").add({
                    titulo: t, descripcion: d, link: l,
                    foto: e.target.result, autor: userLogueado.displayName,
                    fecha: Date.now()
                }).then(() => {
                    alert("¡Publicado!");
                    irA('inicio');
                });
            };
            reader.readAsDataURL(f);
        }
    </script>
</body>
</html>
